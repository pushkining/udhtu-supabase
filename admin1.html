<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DIPLOM // ADMIN</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #080a0f;
  --surface: #0e1118;
  --surface2: #141820;
  --border: #1e2333;
  --border2: #2a3045;
  --accent: #00e5a0;
  --accent-dim: rgba(0,229,160,0.12);
  --accent2: #ff4560;
  --accent3: #4d9fff;
  --text: #c9d1e0;
  --muted: #4a5268;
  --label: #6b7a99;
  --mono: 'Share Tech Mono', monospace;
  --display: 'Bebas Neue', sans-serif;
  --danger: #ff4560;
  --warning: #ffb830;
  --success: #00e5a0;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;}

/* SCANLINES */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
}

/* ─── LAYOUT ─── */
#app{display:flex;height:100vh;overflow:hidden;}

/* ─── SIDEBAR ─── */
.sidebar{
  width:220px;min-width:220px;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:0;
}
.sidebar-logo{
  padding:1.5rem 1.2rem 1rem;
  border-bottom:1px solid var(--border);
}
.sidebar-logo h1{font-family:var(--display);font-size:2rem;letter-spacing:.1em;color:#fff;}
.sidebar-logo span{font-size:.6rem;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;}
.sidebar-nav{flex:1;padding:.8rem 0;}
.nav-item{
  display:flex;align-items:center;gap:.7rem;
  padding:.65rem 1.2rem;cursor:pointer;
  font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--label);border-left:2px solid transparent;
  transition:all .15s;
}
.nav-item:hover{color:var(--text);background:var(--accent-dim);}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-dim);}
.nav-icon{font-size:1rem;width:18px;text-align:center;}
.sidebar-user{
  padding:1rem 1.2rem;border-top:1px solid var(--border);
  font-size:.65rem;letter-spacing:.08em;
}
.sidebar-user .user-email{color:var(--text);margin-bottom:.3rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sidebar-user .user-role{
  display:inline-block;padding:1px 6px;font-size:.6rem;
  letter-spacing:.1em;text-transform:uppercase;border:1px solid;margin-bottom:.6rem;
}
.role-admin{color:var(--accent2);border-color:var(--accent2);}
.role-editor{color:var(--accent3);border-color:var(--accent3);}
.role-viewer{color:var(--muted);border-color:var(--muted);}
.btn-logout{
  background:transparent;border:1px solid var(--border2);color:var(--muted);
  padding:.35rem .7rem;font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;width:100%;transition:all .15s;
}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}

/* ─── MAIN ─── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{
  height:48px;min-height:48px;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;
}
.topbar-title{font-family:var(--display);font-size:1.4rem;letter-spacing:.1em;color:#fff;}
.topbar-meta{font-size:.65rem;color:var(--muted);letter-spacing:.08em;}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:.4rem;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

.content{flex:1;overflow-y:auto;padding:1.5rem;}

/* ─── LOGIN ─── */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  height:100vh;background:var(--bg);
}
.login-card{
  width:380px;background:var(--surface);
  border:1px solid var(--border);border-top:3px solid var(--accent);
  padding:2.5rem;position:relative;
}
.login-card::after{content:'';position:absolute;top:-3px;right:-3px;width:10px;height:10px;background:var(--accent);}
.login-logo{margin-bottom:2rem;}
.login-logo h1{font-family:var(--display);font-size:3rem;letter-spacing:.1em;color:#fff;}
.login-logo p{font-size:.65rem;letter-spacing:.15em;color:var(--accent);text-transform:uppercase;}
.form-group{margin-bottom:1.2rem;}
.form-group label{display:block;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--label);margin-bottom:.4rem;}
.form-group input{
  width:100%;background:var(--bg);border:1px solid var(--border2);
  color:var(--text);font-family:var(--mono);font-size:.82rem;
  padding:.6rem .8rem;outline:none;transition:border-color .15s;
}
.form-group input:focus{border-color:var(--accent);}
.btn-primary{
  width:100%;background:var(--accent);color:#080a0f;
  border:none;padding:.75rem;font-family:var(--display);
  font-size:1.1rem;letter-spacing:.15em;cursor:pointer;
  transition:opacity .15s;margin-top:.5rem;
}
.btn-primary:hover{opacity:.85;}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.login-toggle{
  margin-top:1rem;text-align:center;font-size:.68rem;
  color:var(--label);letter-spacing:.06em;
}
.login-toggle a{color:var(--accent);cursor:pointer;text-decoration:none;}
.login-toggle a:hover{text-decoration:underline;}
.error-msg{
  background:rgba(255,69,96,.08);border:1px solid rgba(255,69,96,.3);
  color:var(--danger);padding:.5rem .7rem;font-size:.7rem;
  letter-spacing:.05em;margin-bottom:1rem;display:none;
}

/* ─── STATS ─── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  padding:1rem 1.2rem;position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--accent);
}
.stat-card.danger::before{background:var(--accent2);}
.stat-card.info::before{background:var(--accent3);}
.stat-card.warn::before{background:var(--warning);}
.stat-label{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--label);margin-bottom:.4rem;}
.stat-value{font-family:var(--display);font-size:2rem;letter-spacing:.05em;color:#fff;line-height:1;}
.stat-sub{font-size:.6rem;color:var(--muted);margin-top:.3rem;letter-spacing:.06em;}

/* ─── TABLE ─── */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:.8rem;
}
.section-title{
  font-family:var(--display);font-size:1.3rem;letter-spacing:.1em;color:#fff;
}
.section-actions{display:flex;gap:.6rem;align-items:center;}
.btn-sm{
  background:transparent;border:1px solid var(--border2);color:var(--label);
  padding:.35rem .8rem;font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;transition:all .15s;
}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.btn-sm.danger:hover{border-color:var(--danger);color:var(--danger);}
.btn-add{
  background:var(--accent);color:#080a0f;border:none;
  padding:.35rem .8rem;font-family:var(--mono);font-size:.65rem;
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:opacity .15s;
}
.btn-add:hover{opacity:.85;}

.table-wrap{
  background:var(--surface);border:1px solid var(--border);
  overflow-x:auto;
}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--border2);}
th{
  padding:.6rem .8rem;text-align:left;font-size:.6rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--label);
  white-space:nowrap;background:var(--surface2);
}
th.sortable{cursor:pointer;}
th.sortable:hover{color:var(--accent);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover{background:var(--accent-dim);}
td{padding:.55rem .8rem;font-size:.78rem;white-space:nowrap;color:var(--text);}
td.num{color:var(--accent);font-size:.75rem;}
td.null-val{color:var(--muted);font-style:italic;}
td.date-val{color:var(--accent3);}
td.actions-td{display:flex;gap:.4rem;}
.btn-icon{
  background:transparent;border:1px solid var(--border2);
  color:var(--muted);padding:.2rem .5rem;font-family:var(--mono);
  font-size:.65rem;cursor:pointer;transition:all .15s;
}
.btn-icon:hover{border-color:var(--accent);color:var(--accent);}
.btn-icon.del:hover{border-color:var(--danger);color:var(--danger);}

/* ─── PAGINATION ─── */
.pagination{
  display:flex;align-items:center;justify-content:space-between;
  padding:.8rem 1rem;border-top:1px solid var(--border);
  background:var(--surface);
}
.page-info{font-size:.65rem;color:var(--muted);letter-spacing:.06em;}
.page-btns{display:flex;gap:.4rem;}

/* ─── MODAL ─── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(8,10,15,.85);
  display:flex;align-items:center;justify-content:center;z-index:1000;
  backdrop-filter:blur(2px);
}
.modal{
  background:var(--surface);border:1px solid var(--border2);
  border-top:3px solid var(--accent);width:680px;max-width:95vw;
  max-height:88vh;display:flex;flex-direction:column;position:relative;
}
.modal::after{content:'';position:absolute;top:-3px;right:-3px;width:10px;height:10px;background:var(--accent);}
.modal-header{
  padding:1rem 1.5rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.modal-title{font-family:var(--display);font-size:1.4rem;letter-spacing:.1em;color:#fff;}
.btn-close{
  background:transparent;border:none;color:var(--muted);
  font-size:1.2rem;cursor:pointer;padding:.2rem .4rem;
  transition:color .15s;
}
.btn-close:hover{color:var(--danger);}
.modal-body{padding:1.5rem;overflow-y:auto;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-grid .full{grid-column:1/-1;}
.modal-footer{
  padding:1rem 1.5rem;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:.8rem;flex-shrink:0;
}
.section-divider{
  grid-column:1/-1;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;
  color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:.4rem;margin-top:.5rem;
}

/* ─── USERS PAGE ─── */
.users-table{width:100%;}
.role-select{
  background:var(--bg);border:1px solid var(--border2);color:var(--text);
  font-family:var(--mono);font-size:.72rem;padding:.25rem .5rem;outline:none;
}
.role-select:focus{border-color:var(--accent);}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:9000;
  background:var(--surface);border:1px solid var(--border2);
  border-left:3px solid var(--accent);padding:.7rem 1.2rem;
  font-size:.72rem;letter-spacing:.06em;color:var(--text);
  transform:translateX(120%);transition:transform .3s;max-width:300px;
}
.toast.show{transform:translateX(0);}
.toast.error{border-left-color:var(--danger);}

/* ─── LOADER ─── */
.loader{text-align:center;padding:2rem;color:var(--muted);font-size:.72rem;letter-spacing:.1em;}
.loader::after{content:'...';animation:dots 1.2s infinite;}
@keyframes dots{0%{content:'.';}33%{content:'..';}66%{content:'...';}100%{content:'';}}

/* ─── EMPTY ─── */
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:.72rem;letter-spacing:.08em;}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}

.hidden{display:none!important;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <h1>DIPLOM</h1>
      <p>Admin Interface // v1.0</p>
    </div>
    <div class="error-msg" id="auth-error"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="user@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-primary" id="login-btn">// УВІЙТИ</button>
    <div class="login-toggle">
      Немає акаунту? <a id="toggle-mode">Зареєструватись</a>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <h1>DIPLOM</h1>
      <span>Admin Panel</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="dashboard">
        <span class="nav-icon">◈</span> Dashboard
      </div>
      <div class="nav-item" data-page="records">
        <span class="nav-icon">◧</span> Записи
      </div>
      <div class="nav-item admin-only hidden" data-page="users">
        <span class="nav-icon">◉</span> Користувачі
      </div>
    </nav>
    <div class="sidebar-user">
      <div class="user-email" id="user-email-display">—</div>
      <div class="user-role" id="user-role-display">viewer</div>
      <button class="btn-logout" id="logout-btn">// вийти</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="page-title">DASHBOARD</span>
      <span class="topbar-meta">
        <span class="status-dot"></span>
        SUPABASE CONNECTED // pushkining
      </span>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">НОВИЙ ЗАПИС</span>
      <button class="btn-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://ecadbdnawvujogtimhms.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjYWRiZG5hd3Z1am9ndGltaG1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNjExNzEsImV4cCI6MjA5MzczNzE3MX0.-0Me6KeY_vOA6JkVvxkB7sumZ-M-jXTIVRhPyx2Pj7c';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── STATE ───
let currentUser = null;
let currentRole = 'viewer';
let currentPage = 'dashboard';
let recordsPage = 0;
const PAGE_SIZE = 10;

// ─── TOAST ───
function showToast(msg, isError=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError?' error':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// ─── AUTH ───
let isRegMode = false;
document.getElementById('toggle-mode').addEventListener('click', ()=>{
  isRegMode = !isRegMode;
  document.getElementById('login-btn').textContent = isRegMode ? '// ЗАРЕЄСТРУВАТИСЬ' : '// УВІЙТИ';
  document.getElementById('toggle-mode').textContent = isRegMode ? 'Увійти' : 'Зареєструватись';
  document.querySelector('.login-toggle').firstChild.textContent = isRegMode ? 'Вже є акаунт? ' : 'Немає акаунту? ';
  document.getElementById('auth-error').style.display='none';
});

document.getElementById('login-btn').addEventListener('click', async ()=>{
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('auth-error');
  const btn = document.getElementById('login-btn');
  if(!email||!password){ errEl.textContent='Заповніть всі поля'; errEl.style.display='block'; return; }
  btn.disabled=true; btn.textContent='...';
  let res;
  if(isRegMode){
    res = await sb.auth.signUp({email, password});
    if(res.error){ errEl.textContent=res.error.message; errEl.style.display='block'; btn.disabled=false; btn.textContent='// ЗАРЕЄСТРУВАТИСЬ'; return; }
    // створюємо профіль одразу після реєстрації
    if(res.data.user){
      const {error: profileError} = await sb.from('profiles').insert({id: res.data.user.id, role: 'viewer'});
      if(profileError && profileError.code !== '23505'){ // ігноруємо duplicate
        errEl.textContent = 'Профіль не створено: ' + profileError.message;
        errEl.style.display='block';
        btn.disabled=false; btn.textContent='// ЗАРЕЄСТРУВАТИСЬ';
        return;
      }
    }
    errEl.style.display='none';
    showToast('Реєстрація успішна! Тепер увійдіть.');
    isRegMode=false;
    btn.disabled=false;
    btn.textContent='// УВІЙТИ';
    document.getElementById('toggle-mode').textContent='Зареєструватись';
    document.querySelector('.login-toggle').firstChild.textContent='Немає акаунту? ';
    return;
  } else {
    res = await sb.auth.signInWithPassword({email, password});
  }
  if(res.error){ errEl.textContent=res.error.message; errEl.style.display='block'; btn.disabled=false; btn.textContent='// УВІЙТИ'; return; }
  await initApp(res.data.user);
});

document.getElementById('login-password').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('login-btn').click(); });

document.getElementById('logout-btn').addEventListener('click', async ()=>{
  await sb.auth.signOut();
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').style.display='flex';
  currentUser=null; currentRole='viewer';
});

async function initApp(user){
  currentUser = user;
  // get role
  const {data:profile} = await sb.from('profiles').select('role').eq('id', user.id).single();
  currentRole = profile?.role || 'viewer';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('user-email-display').textContent = user.email;
  const roleEl = document.getElementById('user-role-display');
  roleEl.textContent = currentRole;
  roleEl.className = `user-role role-${currentRole}`;
  // show admin nav
  if(currentRole==='admin'){
    document.querySelectorAll('.admin-only').forEach(el=>el.classList.remove('hidden'));
  }
  navigateTo('dashboard');
}

// check existing session
sb.auth.getSession().then(({data:{session}})=>{
  if(session) initApp(session.user);
});

// ─── NAVIGATION ───
document.querySelectorAll('.nav-item[data-page]').forEach(el=>{
  el.addEventListener('click', ()=>navigateTo(el.dataset.page));
});

function navigateTo(page){
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.page===page);
  });
  const titles={dashboard:'DASHBOARD',records:'ЗАПИСИ',users:'КОРИСТУВАЧІ'};
  document.getElementById('page-title').textContent = titles[page]||page.toUpperCase();
  const content = document.getElementById('main-content');
  content.innerHTML='<div class="loader">Завантаження</div>';
  if(page==='dashboard') renderDashboard();
  else if(page==='records') renderRecords();
  else if(page==='users') renderUsers();
}

// ─── DASHBOARD ───
async function renderDashboard(){
  const {data, error} = await sb.from('records').select('*').order('date',{ascending:false}).limit(10);
  const {count} = await sb.from('records').select('*',{count:'exact',head:true});
  const content = document.getElementById('main-content');
  if(error){ content.innerHTML=`<div class="empty">Помилка: ${error.message}</div>`; return; }
  const latest = data[0];
  content.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Всього записів</div>
        <div class="stat-value">${count||0}</div>
        <div class="stat-sub">в базі даних</div>
      </div>
      <div class="stat-card danger">
        <div class="stat-label">Бойових випадків</div>
        <div class="stat-value">${latest?.combat_cases??'—'}</div>
        <div class="stat-sub">останній запис</div>
      </div>
      <div class="stat-card info">
        <div class="stat-label">Flu Cases</div>
        <div class="stat-value">${latest?.flu_cases?.toLocaleString()??'—'}</div>
        <div class="stat-sub">останній запис</div>
      </div>
      <div class="stat-card warn">
        <div class="stat-label">Останній запис</div>
        <div class="stat-value" style="font-size:1.2rem;padding-top:.4rem">${latest?.date??'—'}</div>
        <div class="stat-sub">${latest?.tactic_focus??''}</div>
      </div>
    </div>
    <div class="section-header">
      <span class="section-title">ОСТАННІ 10 ЗАПИСІВ</span>
      ${(currentRole==='editor'||currentRole==='admin')?`<button class="btn-add" id="dash-add-btn">+ ДОДАТИ</button>`:''}
    </div>
    ${buildRecordsTable(data, false)}
  `;
  if(document.getElementById('dash-add-btn')) document.getElementById('dash-add-btn').addEventListener('click',()=>openAddModal());
  bindTableActions();
}

// ─── RECORDS PAGE ───
async function renderRecords(){
  const from = recordsPage * PAGE_SIZE;
  const to = from + PAGE_SIZE - 1;
  const {data, error, count} = await sb.from('records').select('*',{count:'exact'}).order('date',{ascending:false}).range(from, to);
  const content = document.getElementById('main-content');
  if(error){ content.innerHTML=`<div class="empty">Помилка: ${error.message}</div>`; return; }
  const totalPages = Math.ceil((count||0)/PAGE_SIZE);
  content.innerHTML = `
    <div class="section-header">
      <span class="section-title">ВСІ ЗАПИСИ</span>
      <div class="section-actions">
        ${(currentRole==='editor'||currentRole==='admin')?`<button class="btn-add" id="rec-add-btn">+ ДОДАТИ</button>`:''}
      </div>
    </div>
    ${buildRecordsTable(data, true)}
    <div class="pagination">
      <span class="page-info">
        Записів: ${count} // Сторінка ${recordsPage+1} з ${totalPages}
      </span>
      <div class="page-btns">
        <button class="btn-sm" id="pg-prev" ${recordsPage===0?'disabled':''}>← ПОПЕРЕДНЯ</button>
        <button class="btn-sm" id="pg-next" ${recordsPage>=totalPages-1?'disabled':''}>НАСТУПНА →</button>
      </div>
    </div>
  `;
  if(document.getElementById('rec-add-btn')) document.getElementById('rec-add-btn').addEventListener('click',()=>openAddModal());
  document.getElementById('pg-prev')?.addEventListener('click',()=>{ recordsPage--; renderRecords(); });
  document.getElementById('pg-next')?.addEventListener('click',()=>{ recordsPage++; renderRecords(); });
  bindTableActions();
}

function buildRecordsTable(data, showAll){
  if(!data||data.length===0) return '<div class="empty">Записів не знайдено</div>';
  const cols = showAll
    ? ['date','tactic_focus','combat_cases','flu_cases','est_pop_mln','e_c','i_real','d_drone','true_tacmed','true_cardio']
    : ['date','tactic_focus','combat_cases','flu_cases','e_c','i_real','true_tacmed','true_cardio'];
  const labels = {date:'Дата',tactic_focus:'Тактика',combat_cases:'Бойові',flu_cases:'Грип',est_pop_mln:'Населення',e_c:'E_c',i_real:'I_real',d_drone:'D_drone',true_tacmed:'T.Tacmed',true_cardio:'T.Cardio'};
  const numCols = new Set(['combat_cases','flu_cases','est_pop_mln','e_c','i_real','d_drone','true_tacmed','true_cardio','w_scale','k_prior','c_mob','k_pharm']);
  const canEdit = currentRole==='admin';
  const canDel = currentRole==='admin';
  let html = `<div class="table-wrap"><table><thead><tr>`;
  cols.forEach(c=>{ html+=`<th>${labels[c]||c}</th>`; });
  if(canEdit||canDel) html+=`<th>Дії</th>`;
  html+=`</tr></thead><tbody>`;
  data.forEach(row=>{
    html+=`<tr>`;
    cols.forEach(c=>{
      const v = row[c];
      if(v===null||v===undefined) html+=`<td class="null-val">null</td>`;
      else if(c==='date') html+=`<td class="date-val">${v}</td>`;
      else if(numCols.has(c)) html+=`<td class="num">${typeof v==='number'?v.toFixed(v%1===0?0:4):v}</td>`;
      else html+=`<td>${v}</td>`;
    });
    if(canEdit||canDel){
      html+=`<td class="actions-td">`;
      if(canEdit) html+=`<button class="btn-icon edit-btn" data-id="${row.id}">✎</button>`;
      if(canDel) html+=`<button class="btn-icon del del-btn" data-id="${row.id}">✕</button>`;
      html+=`</td>`;
    }
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;
}

function bindTableActions(){
  document.querySelectorAll('.edit-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>openEditModal(btn.dataset.id));
  });
  document.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>deleteRecord(btn.dataset.id));
  });
}

// ─── MODAL ───
const INPUT_FIELDS = [
  {key:'date',label:'Дата',type:'date',group:'input'},
  {key:'tactic_focus',label:'Tactic Focus',type:'text',group:'input'},
  {key:'combat_cases',label:'Combat Cases',type:'number',group:'input'},
  {key:'w_scale',label:'W Scale',type:'number',step:'0.01',group:'input'},
  {key:'k_prior',label:'K Prior',type:'number',step:'0.01',group:'input'},
  {key:'flu_cases',label:'Flu Cases',type:'number',group:'input'},
  {key:'est_pop_mln',label:'Est Pop (mln)',type:'number',step:'0.01',group:'input'},
  {key:'c_mob',label:'C Mob',type:'number',step:'0.001',group:'input'},
  {key:'k_pharm',label:'K Pharm',type:'number',step:'0.001',group:'input'},
  {key:'e_c',label:'E_c',type:'number',step:'0.01',group:'input'},
  {key:'i_real',label:'I Real',type:'number',step:'0.000001',group:'input'},
  {key:'d_drone',label:'D Drone',type:'number',step:'0.000001',group:'input'},
  {key:'digest',label:'Digest',type:'number',step:'0.01',group:'input'},
  {key:'tacmed',label:'Tacmed',type:'number',step:'0.01',group:'input'},
  {key:'painkiller',label:'Painkiller',type:'number',step:'0.01',group:'input'},
  {key:'lung',label:'Lung',type:'number',step:'0.01',group:'input'},
  {key:'antibiot',label:'Antibiot',type:'number',step:'0.01',group:'input'},
  {key:'cardio',label:'Cardio',type:'number',step:'0.01',group:'input'},
  {key:'equip',label:'Equip',type:'number',step:'0.01',group:'input'},
  {key:'true_tacmed',label:'True Tacmed',type:'number',step:'0.0001',group:'true'},
  {key:'true_painkiller',label:'True Painkiller',type:'number',step:'0.0001',group:'true'},
  {key:'true_antibiot',label:'True Antibiot',type:'number',step:'0.0001',group:'true'},
  {key:'true_lung',label:'True Lung',type:'number',step:'0.0001',group:'true'},
  {key:'true_digest',label:'True Digest',type:'number',step:'0.0001',group:'true'},
  {key:'true_cardio',label:'True Cardio',type:'number',step:'0.0001',group:'true'},
];

function buildFormHTML(record=null){
  let html=`<div class="form-grid">`;
  html+=`<div class="section-divider">// Вхідні параметри</div>`;
  INPUT_FIELDS.filter(f=>f.group==='input').forEach(f=>{
    const val = record?.[f.key]??'';
    html+=`<div class="form-group">
      <label>${f.label}</label>
      <input type="${f.type}" id="f_${f.key}" name="${f.key}"
        ${f.step?`step="${f.step}"`:''}
        value="${val}" placeholder="${val===''?'null':''}"/>
    </div>`;
  });
  html+=`<div class="section-divider">// True значення</div>`;
  INPUT_FIELDS.filter(f=>f.group==='true').forEach(f=>{
    const val = record?.[f.key]??'';
    html+=`<div class="form-group">
      <label>${f.label}</label>
      <input type="${f.type}" id="f_${f.key}" name="${f.key}"
        ${f.step?`step="${f.step}"`:''}
        value="${val}" placeholder="${val===''?'null':''}"/>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

function getFormValues(){
  const obj={};
  INPUT_FIELDS.forEach(f=>{
    const el=document.getElementById(`f_${f.key}`);
    if(!el) return;
    const v=el.value.trim();
    if(v==='') obj[f.key]=null;
    else if(f.type==='number') obj[f.key]=parseFloat(v);
    else obj[f.key]=v;
  });
  return obj;
}

function openAddModal(){
  document.getElementById('modal-title').textContent='НОВИЙ ЗАПИС';
  document.getElementById('modal-body').innerHTML=buildFormHTML();
  document.getElementById('modal-footer').innerHTML=`
    <button class="btn-sm" id="modal-cancel-btn">Скасувати</button>
    <button class="btn-add" id="modal-save-btn">// ЗБЕРЕГТИ</button>
  `;
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
  document.getElementById('modal-save-btn').addEventListener('click', async ()=>{
    const vals=getFormValues();
    const {error}=await sb.from('records').insert([vals]);
    if(error){ showToast('Помилка: '+error.message, true); return; }
    showToast('Запис додано!');
    closeModal();
    navigateTo(currentPage);
  });
}

async function openEditModal(id){
  const {data,error}=await sb.from('records').select('*').eq('id',id).single();
  if(error){ showToast('Помилка завантаження', true); return; }
  document.getElementById('modal-title').textContent='РЕДАГУВАННЯ';
  document.getElementById('modal-body').innerHTML=buildFormHTML(data);
  document.getElementById('modal-footer').innerHTML=`
    <button class="btn-sm" id="modal-cancel-btn">Скасувати</button>
    <button class="btn-add" id="modal-save-btn">// ЗБЕРЕГТИ</button>
  `;
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
  document.getElementById('modal-save-btn').addEventListener('click', async ()=>{
    const vals=getFormValues();
    const {error:e}=await sb.from('records').update(vals).eq('id',id);
    if(e){ showToast('Помилка: '+e.message, true); return; }
    showToast('Запис оновлено!');
    closeModal();
    navigateTo(currentPage);
  });
}

async function deleteRecord(id){
  if(!confirm('Видалити цей запис?')) return;
  const {error}=await sb.from('records').delete().eq('id',id);
  if(error){ showToast('Помилка: '+error.message, true); return; }
  showToast('Видалено!');
  navigateTo(currentPage);
}

function closeModal(){
  document.getElementById('modal-overlay').classList.add('hidden');
}
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e=>{ if(e.target===document.getElementById('modal-overlay')) closeModal(); });

// ─── USERS ───
async function renderUsers(){
  if(currentRole!=='admin'){ document.getElementById('main-content').innerHTML='<div class="empty">Доступ заборонено</div>'; return; }
  const {data:profiles}=await sb.from('profiles').select('id, role, created_at');
  const {data:{users}}=await sb.auth.admin?.listUsers?.()??{data:{users:[]}};
  const content=document.getElementById('main-content');

  // merge by id from profiles (we have all profiles, get emails via alternative)
  // Since we can't use admin API from anon key, show what we have
  content.innerHTML=`
    <div class="section-header">
      <span class="section-title">КОРИСТУВАЧІ</span>
      <span class="topbar-meta">${profiles?.length||0} зареєстровано</span>
    </div>
    <div class="table-wrap">
      <table class="users-table">
        <thead><tr><th>User ID</th><th>Роль</th><th>Дата реєстрації</th><th>Дії</th></tr></thead>
        <tbody>
          ${(profiles||[]).map(p=>`
            <tr>
              <td style="font-size:.68rem;color:var(--muted)">${p.id}</td>
              <td>
                <select class="role-select" data-uid="${p.id}">
                  <option value="viewer" ${p.role==='viewer'?'selected':''}>viewer</option>
                  <option value="editor" ${p.role==='editor'?'selected':''}>editor</option>
                  <option value="admin" ${p.role==='admin'?'selected':''}>admin</option>
                </select>
              </td>
              <td class="date-val">${p.created_at?.slice(0,10)||'—'}</td>
              <td><button class="btn-sm save-role-btn" data-uid="${p.id}">Зберегти</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    <div style="margin-top:.8rem;font-size:.65rem;color:var(--muted);letter-spacing:.06em;">
      * Email юзерів доступний через Supabase Dashboard → Authentication → Users
    </div>
  `;
  document.querySelectorAll('.save-role-btn').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const uid=btn.dataset.uid;
      const role=document.querySelector(`.role-select[data-uid="${uid}"]`).value;
      const {error}=await sb.from('profiles').update({role}).eq('id',uid);
      if(error){ showToast('Помилка: '+error.message,true); return; }
      showToast('Роль оновлено!');
    });
  });
}
